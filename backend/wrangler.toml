name = "luckylottery-backend"
main = "src/index.ts"
compatibility_date = "2025-06-07"

[[d1_databases]]
binding = "DB"
database_name = "lottery-db"

# Cron Trigger: 每天晚上 22:00（北京时间）检查中奖
# 双色球开奖时间：周二、四、日 21:15
[triggers]
crons = ["0 14 * * *"]  # UTC 14:00 = 北京时间 22:00

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1