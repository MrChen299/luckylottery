<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双色球 · 智能机选</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ============ CSS Variables & Reset ============ */
:root {
  --bg-deep: #0a0a14;
  --bg-card: #12122a;
  --bg-card-alt: #1a1a38;
  --gold: #d4a745;
  --gold-light: #f0d68a;
  --gold-dark: #a07828;
  --crimson: #c0392b;
  --crimson-light: #e74c3c;
  --blue-accent: #4a90d9;
  --blue-ball: #2980b9;
  --text-primary: #e8e6e0;
  --text-secondary: #9896a8;
  --text-muted: #5e5c72;
  --border-subtle: rgba(255,255,255,0.06);
  --border-gold: rgba(212,167,69,0.3);
  --radius-sm: 8px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-xl: 32px;
  --shadow-gold: 0 0 40px rgba(212,167,69,0.18);
  --shadow-card: 0 8px 40px rgba(0,0,0,0.4);
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ============ Animated Background ============ */
.bg-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.bg-layer::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(212,167,69,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(192,57,43,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(74,144,217,0.03) 0%, transparent 60%);
  animation: bgFloat 20s ease-in-out infinite;
}
@keyframes bgFloat {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(1%, -0.5%) rotate(0.5deg); }
  66% { transform: translate(-0.5%, 1%) rotate(-0.5deg); }
}

.bg-particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.particle {
  position: absolute;
  border-radius: 50%;
  animation: particleFloat linear infinite;
  opacity: 0;
}
@keyframes particleFloat {
  0% { opacity: 0; transform: translateY(100vh) scale(0); }
  10% { opacity: 0.6; }
  90% { opacity: 0.1; }
  100% { opacity: 0; transform: translateY(-10vh) scale(1.2); }
}

/* ============ Main Container ============ */
.app-container {
  position: relative;
  z-index: 1;
  max-width: 880px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* ============ Header ============ */
.header {
  text-align: center;
  margin-bottom: 48px;
}
.header-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, var(--gold-light), var(--gold-dark));
  box-shadow: 0 0 60px rgba(212,167,69,0.3), 0 8px 32px rgba(0,0,0,0.5);
  margin-bottom: 20px;
  animation: iconPulse 3s ease-in-out infinite;
  position: relative;
}
.header-icon::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  opacity: 0.4;
  animation: iconRing 3s ease-in-out infinite;
}
@keyframes iconPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
@keyframes iconRing {
  0%, 100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.15); opacity: 0; }
}
.header-icon svg { width: 36px; height: 36px; fill: #1a1a2e; }

.header h1 {
  font-family: 'Noto Serif SC', 'Playfair Display', serif;
  font-weight: 900;
  font-size: clamp(2rem, 4vw, 2.8rem);
  background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}
.header .subtitle {
  font-family: 'Noto Serif SC', serif;
  font-size: 0.95rem;
  color: var(--text-secondary);
  letter-spacing: 0.12em;
  font-weight: 400;
}

/* ============ Section Cards ============ */
.section {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  margin-bottom: 28px;
  box-shadow: var(--shadow-card);
  position: relative;
  overflow: hidden;
  transition: var(--transition);
}
.section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-gold), transparent);
}
.section:hover {
  border-color: var(--border-gold);
  box-shadow: var(--shadow-card), var(--shadow-gold);
}
.section-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--gold-light);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 10px var(--gold);
}

/* ============ Quick Pick Controls ============ */
.pick-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
  margin-bottom: 28px;
}
.count-selector {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-card-alt);
  border-radius: var(--radius-md);
  padding: 4px;
  border: 1px solid var(--border-subtle);
}
.count-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-primary);
  font-size: 1.2rem;
  cursor: pointer;
  transition: var(--transition);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Sans SC', sans-serif;
}
.count-btn:hover { background: rgba(212,167,69,0.15); color: var(--gold-light); }
.count-btn:active { transform: scale(0.9); }
.count-value {
  min-width: 44px;
  text-align: center;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--gold-light);
  font-family: 'Noto Serif SC', serif;
  user-select: none;
}
.count-label {
  color: var(--text-secondary);
  font-size: 0.85rem;
  margin-left: 6px;
  font-weight: 400;
}

.btn-generate {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 36px;
  border: none;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--crimson), #96281b);
  color: #fff;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 1.05rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.3s ease;
  box-shadow: 0 4px 24px rgba(192,57,43,0.4);
  position: relative;
  overflow: hidden;
}
.btn-generate::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
  transform: translateX(-100%);
  transition: transform 0.6s ease;
}
.btn-generate:hover::after { transform: translateX(100%); }
.btn-generate:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 32px rgba(192,57,43,0.55);
}
.btn-generate:active { transform: translateY(0) scale(0.98); }
.btn-generate.loading { pointer-events: none; opacity: 0.7; }
.btn-generate svg { width: 20px; height: 20px; }

/* ============ Lucky Input ============ */
.lucky-input-wrap {
  position: relative;
  display: flex;
  align-items: center;
  flex: 1;
  min-width: 180px;
  max-width: 280px;
}
.lucky-input {
  width: 100%;
  height: 44px;
  padding: 0 36px 0 16px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  background: var(--bg-card-alt);
  color: var(--text-primary);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: var(--transition);
}
.lucky-input::placeholder {
  color: var(--text-muted);
  font-size: 0.82rem;
}
.lucky-input:focus {
  border-color: var(--border-gold);
  box-shadow: 0 0 12px rgba(212,167,69,0.15);
}
.lucky-clear {
  position: absolute;
  right: 6px;
  width: 28px; height: 28px;
  border: none;
  border-radius: 50%;
  background: transparent;
  color: var(--text-muted);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
  opacity: 0;
  pointer-events: none;
}
.lucky-clear.visible { opacity: 1; pointer-events: auto; }
.lucky-clear:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.lucky-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--bg-card);
  border: 1px solid var(--border-gold);
  border-radius: var(--radius-sm);
  margin-top: 4px;
  max-height: 200px;
  overflow-y: auto;
  z-index: 20;
  display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.lucky-dropdown.show { display: block; }
.lucky-dropdown-item {
  padding: 10px 14px;
  cursor: pointer;
  font-size: 0.88rem;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.15s;
}
.lucky-dropdown-item:hover { background: rgba(212,167,69,0.1); }
.lucky-dropdown-item:first-child { border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
.lucky-dropdown-item:last-child { border-radius: 0 0 var(--radius-sm) var(--radius-sm); }
.lucky-dropdown-item .item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lucky-dropdown-item .item-del {
  color: var(--text-muted);
  font-size: 0.78rem;
  margin-left: 8px;
  opacity: 0;
  transition: opacity 0.15s;
  flex-shrink: 0;
}
.lucky-dropdown-item:hover .item-del { opacity: 1; }
.lucky-dropdown-item .item-del:hover { color: var(--crimson-light); }
.lucky-dropdown-empty {
  padding: 14px;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.82rem;
}

/* ============ Lottery Balls ============ */
.ball-display {
  display: flex;
  flex-direction: column;
  gap: 32px;
}
.ticket-group {
  background: var(--bg-card-alt);
  border-radius: var(--radius-md);
  padding: 20px 24px;
  border: 1px solid var(--border-subtle);
  animation: ticketAppear 0.5s ease backwards;
}
.ticket-group:nth-child(1) { animation-delay: 0s; }
.ticket-group:nth-child(2) { animation-delay: 0.08s; }
.ticket-group:nth-child(3) { animation-delay: 0.16s; }
.ticket-group:nth-child(4) { animation-delay: 0.24s; }
.ticket-group:nth-child(5) { animation-delay: 0.32s; }
.ticket-group:nth-child(n+6) { animation-delay: 0.4s; }

@keyframes ticketAppear {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.ticket-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin-bottom: 12px;
  font-weight: 500;
}
.balls-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.ball {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  font-size: 1rem;
  font-family: 'Noto Sans SC', sans-serif;
  color: #fff;
  position: relative;
  box-shadow: inset 0 -3px 6px rgba(0,0,0,0.3), 0 3px 12px rgba(0,0,0,0.3);
  animation: ballPop 0.4s cubic-bezier(0.34,1.56,0.64,1) backwards;
  transition: transform 0.2s ease;
  cursor: default;
}
.ball:hover { transform: scale(1.15); }
.ball-red {
  background: radial-gradient(circle at 35% 30%, #f8716b, #c0392b 60%, #7b1d19);
  box-shadow: inset 0 -3px 6px rgba(0,0,0,0.3), 0 3px 12px rgba(192,57,43,0.4);
}
.ball-blue {
  background: radial-gradient(circle at 35% 30%, #6db3f2, #2471a3 60%, #123a5e);
  box-shadow: inset 0 -3px 6px rgba(0,0,0,0.3), 0 3px 12px rgba(41,128,185,0.5);
}
@keyframes ballPop {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.ball-divider {
  color: var(--text-muted);
  font-size: 1.1rem;
  font-weight: 300;
  margin: 0 2px;
  user-select: none;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.empty-state-icon {
  font-size: 3rem;
  margin-bottom: 12px;
  opacity: 0.5;
}

/* ============ Strategy Badge ============ */
.strategy-info {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.strategy-badge {
  font-size: 0.75rem;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(212,167,69,0.1);
  color: var(--gold-light);
  border: 1px solid rgba(212,167,69,0.2);
  font-weight: 500;
}

/* ============ History Table ============ */
.history-scroll {
  max-height: 560px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-gold) transparent;
  border-radius: var(--radius-sm);
}
.history-scroll::-webkit-scrollbar { width: 4px; }
.history-scroll::-webkit-scrollbar-track { background: transparent; }
.history-scroll::-webkit-scrollbar-thumb {
  background: var(--border-gold);
  border-radius: 2px;
}

.history-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}
.history-table thead {
  position: sticky;
  top: 0;
  z-index: 2;
}
.history-table th {
  background: var(--bg-card);
  color: var(--text-muted);
  font-weight: 600;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  padding: 14px 10px;
  text-align: center;
  border-bottom: 2px solid var(--border-gold);
  white-space: nowrap;
}
.history-table td {
  padding: 12px 6px;
  text-align: center;
  border-bottom: 1px solid var(--border-subtle);
  white-space: nowrap;
  transition: background 0.2s ease;
}
.history-table tbody tr {
  transition: background 0.2s ease;
}
.history-table tbody tr:hover {
  background: rgba(212,167,69,0.05);
}
.history-table tbody tr:nth-child(even) {
  background: rgba(255,255,255,0.015);
}
.history-table tbody tr:nth-child(even):hover {
  background: rgba(212,167,69,0.06);
}
.issue-num {
  font-weight: 600;
  color: var(--text-primary);
  font-family: 'Noto Serif SC', serif;
}
.mini-ball {
  display: inline-block;
  width: 28px; height: 28px;
  line-height: 28px;
  border-radius: 50%;
  text-align: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: #fff;
  margin: 1px;
  vertical-align: middle;
}
.mini-ball-red {
  background: radial-gradient(circle at 35% 30%, #f8716b, #c0392b 60%, #7b1d19);
}
.mini-ball-blue {
  background: radial-gradient(circle at 35% 30%, #6db3f2, #2471a3 60%, #123a5e);
}

/* ============ Loading Spinner ============ */
.loading-overlay {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  flex-direction: column;
  gap: 16px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border-subtle);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  color: var(--text-secondary);
  font-size: 0.9rem;
}

/* ============ Error State ============ */
.error-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--crimson-light);
}
.retry-btn {
  margin-top: 16px;
  padding: 10px 24px;
  border: 1px solid var(--crimson-light);
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--crimson-light);
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.9rem;
  transition: var(--transition);
}
.retry-btn:hover { background: rgba(231,76,60,0.15); }

/* ============ Toast ============ */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-card);
  border: 1px solid var(--border-gold);
  border-radius: var(--radius-md);
  padding: 12px 24px;
  color: var(--gold-light);
  font-size: 0.9rem;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  font-family: 'Noto Sans SC', sans-serif;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ============ Footer ============ */
.footer {
  text-align: center;
  padding: 20px;
  color: var(--text-muted);
  font-size: 0.78rem;
  letter-spacing: 0.05em;
}
.footer a { color: var(--gold); text-decoration: none; }

/* ============ Auth Modal ============ */
.auth-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  backdrop-filter: blur(4px);
}
.auth-overlay.active { opacity: 1; pointer-events: auto; }
.auth-modal {
  background: var(--bg-card);
  border: 1px solid var(--border-gold);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
  position: relative;
  transform: translateY(20px);
  transition: transform 0.3s ease;
}
.auth-overlay.active .auth-modal { transform: translateY(0); }
.auth-modal-close {
  position: absolute;
  top: 12px; right: 16px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.5rem;
  cursor: pointer;
  transition: var(--transition);
}
.auth-modal-close:hover { color: var(--text-primary); }
.auth-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--border-subtle);
}
.auth-tab {
  flex: 1;
  padding: 12px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.95rem;
  cursor: pointer;
  transition: var(--transition);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.auth-tab.active { color: var(--gold-light); border-bottom-color: var(--gold); }
.auth-form { display: none; flex-direction: column; gap: 16px; }
.auth-form.active { display: flex; }
.auth-input {
  height: 44px;
  padding: 0 16px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  background: var(--bg-card-alt);
  color: var(--text-primary);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: var(--transition);
}
.auth-input::placeholder { color: var(--text-muted); }
.auth-input:focus { border-color: var(--border-gold); }
.auth-error {
  color: var(--crimson-light);
  font-size: 0.82rem;
  min-height: 1.2em;
}
.auth-submit {
  height: 44px;
  border: none;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #1a1a2e;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.auth-submit:hover { opacity: 0.9; }
.auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }

/* ============ User Menu ============ */
.user-area {
  display: flex;
  align-items: center;
  gap: 12px;
}
.user-name {
  color: var(--gold-light);
  font-weight: 500;
  font-size: 0.9rem;
}
.btn-auth {
  padding: 8px 20px;
  border: 1px solid var(--border-gold);
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--gold-light);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: var(--transition);
}
.btn-auth:hover { background: rgba(212, 167, 69, 0.12); }
.btn-logout {
  padding: 8px 16px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--text-muted);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: var(--transition);
}
.btn-logout:hover { color: var(--crimson-light); border-color: var(--crimson-light); }

/* ============ Pick History ============ */
.history-card {
  background: var(--bg-card-alt);
  border-radius: var(--radius-md);
  padding: 18px 20px;
  border: 1px solid var(--border-subtle);
  margin-bottom: 12px;
}
.history-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
  font-size: 0.82rem;
  color: var(--text-secondary);
}
.history-card-header strong { color: var(--text-primary); font-family: 'Noto Serif SC', serif; }
.history-card .mini-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  margin-bottom: 6px;
}
.history-card .mini-row .ticket-index {
  color: var(--text-muted);
  font-size: 0.75rem;
  margin-right: 4px;
  min-width: 36px;
}

/* ============ Win Ticker ============ */
.win-ticker-section {
  margin-bottom: 28px;
  overflow: hidden;
}
.win-ticker-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 0.9rem;
  color: var(--gold-light);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.win-ticker-wrapper {
  background: var(--bg-card-alt);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  overflow: hidden;
  position: relative;
  height: 200px;
}
.win-ticker-wrapper::before,
.win-ticker-wrapper::after {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  height: 30px;
  z-index: 2;
  pointer-events: none;
}
.win-ticker-wrapper::before {
  top: 0;
  background: linear-gradient(180deg, var(--bg-card-alt), transparent);
}
.win-ticker-wrapper::after {
  bottom: 0;
  background: linear-gradient(0deg, var(--bg-card-alt), transparent);
}
.win-ticker {
  display: flex;
  flex-direction: column;
  animation: tickerScrollV 30s linear infinite;
  padding: 0 12px;
}
.win-ticker:hover {
  animation-play-state: paused;
}
@keyframes tickerScrollV {
  0% { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}
.win-ticker-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-subtle);
  white-space: nowrap;
}
.win-ticker-item .username {
  color: var(--gold-light);
  font-weight: 500;
}
.win-ticker-item .issue {
  color: var(--text-muted);
  font-size: 0.8rem;
}
.win-ticker-item .prize {
  color: var(--crimson-light);
  font-weight: 700;
}
.win-ticker-empty {
  padding: 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.85rem;
}

/* ============ Win Card ============ */
.win-card {
  background: var(--bg-card-alt);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  border: 1px solid var(--border-subtle);
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.win-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--gold), var(--crimson));
}
.win-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.win-card-header .issue {
  font-weight: 600;
  color: var(--text-primary);
}
.win-card-header .prize-badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
}
.prize-badge.level-1 { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #1a1a2e; }
.prize-badge.level-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #1a1a2e; }
.prize-badge.level-3 { background: linear-gradient(135deg, #cd7f32, #8b4513); color: #fff; }
.prize-badge.level-4 { background: var(--blue-accent); color: #fff; }
.prize-badge.level-5, .prize-badge.level-6, .prize-badge.level-7 { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-subtle); }
.win-card .amount {
  color: var(--crimson-light);
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 10px;
}
.win-card .match-info {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.win-card .balls-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}
.win-card .mini-ball {
  width: 24px;
  height: 24px;
  line-height: 24px;
  font-size: 0.7rem;
}

/* ============ Main Tabs ============ */
.main-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border-subtle);
}
.main-tab {
  flex: 1;
  padding: 12px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.95rem;
  cursor: pointer;
  transition: var(--transition);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.main-tab.active {
  color: var(--gold-light);
  border-bottom-color: var(--gold);
}
.tab-content {
  display: none;
}
.tab-content.active {
  display: block;
}

/* ============ Issue Group ============ */
.issue-group {
  margin-bottom: 20px;
}
.issue-group-header {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--gold-light);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-gold);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.issue-group-header > span {
  flex: 1;
  min-width: 0;
}
.btn-calc {
  padding: 4px 14px;
  border: 1px solid var(--border-gold);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--gold-light);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.78rem;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-calc:hover { background: rgba(212,167,69,0.12); }
.btn-calc:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-calc.calc-done { border-color: var(--border-subtle); color: var(--text-muted); }

/* ============ Calc Result Modal ============ */
.calc-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 60;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.calc-modal-content {
  background: var(--bg-card);
  border: 1px solid var(--border-gold);
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  max-width: 480px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.calc-draw-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border-gold);
}
.calc-draw-label {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-right: 8px;
  white-space: nowrap;
}
.calc-stats {
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.85rem;
  margin-bottom: 16px;
}
.calc-empty {
  text-align: center;
  color: var(--text-muted);
  padding: 24px 0;
}
.calc-result-card {
  background: var(--bg-card-alt);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 10px;
  border: 1px solid var(--border-subtle);
  border-left: 3px solid var(--gold);
}
.calc-result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  font-weight: 600;
  color: var(--text-primary);
}
.calc-result-amount {
  color: var(--crimson-light);
  font-weight: 700;
  font-size: 0.95rem;
  margin-bottom: 4px;
}
.calc-result-match {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.ball-matched {
  box-shadow: 0 0 0 2px var(--gold), 0 0 12px rgba(212,167,69,0.5) !important;
  transform: scale(1.1);
}
.calc-modal-footer {
  text-align: center;
  margin-top: 20px;
}
.calc-close-btn {
  padding: 10px 36px;
  border: none;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #1a1a2e;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.calc-close-btn:hover { opacity: 0.9; }
.batch-card {
  background: var(--bg-card-alt);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 8px;
  border: 1px solid var(--border-subtle);
}
.batch-label {
  font-size: 0.78rem;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

/* ============ Session Expired Modal ============ */
.session-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 60;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.session-modal {
  background: var(--bg-card);
  border: 1px solid var(--border-gold);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  text-align: center;
  max-width: 360px;
  width: 90%;
}
.session-modal p {
  color: var(--text-primary);
  margin-bottom: 20px;
  font-size: 0.95rem;
}
.session-modal button {
  padding: 10px 32px;
  border: none;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #1a1a2e;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
}

/* ============ Responsive ============ */
@media (max-width: 640px) {
  .app-container { padding: 28px 16px 60px; }
  .section { padding: 24px 18px; margin-bottom: 20px; border-radius: var(--radius-md); }
  .header { margin-bottom: 32px; }
  .header h1 { font-size: 1.7rem; }
  .header-icon { width: 56px; height: 56px; }
  .header-icon svg { width: 28px; height: 28px; }
  .pick-controls { gap: 10px; }
  .btn-generate { width: 100%; justify-content: center; padding: 14px 20px; }
  .count-selector { width: 100%; justify-content: center; }
  .lucky-input-wrap { flex: none; width: 100%; max-width: none; }
  .ball { width: 38px; height: 38px; font-size: 0.85rem; }
  .ball:hover { transform: scale(1.1); }
  .ticket-group { padding: 16px 14px; }
  .balls-row { gap: 6px; }
  .history-table { font-size: 0.75rem; }
  .history-table th,
  .history-table td { padding: 10px 3px; }
  .mini-ball { width: 24px; height: 24px; line-height: 24px; font-size: 0.7rem; }
  .history-scroll { max-height: 420px; }
}

@media (min-width: 1024px) {
  .app-container { max-width: 900px; }
}

/* ============ Pagination ============ */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 6px;
  padding: 20px 0 8px;
  margin-top: 12px;
  border-top: 1px solid var(--border-subtle);
}
.page-btn {
  min-width: 32px;
  height: 32px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-primary);
  font-size: 0.82rem;
  cursor: pointer;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Sans SC', sans-serif;
}
.page-btn:hover:not(:disabled) {
  border-color: var(--border-gold);
  color: var(--gold-light);
  background: rgba(212,167,69,0.08);
}
.page-btn.active {
  background: var(--gold);
  border-color: var(--gold);
  color: #1a1a2e;
  font-weight: 600;
}
.page-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}
.page-ellipsis {
  color: var(--text-muted);
  padding: 0 4px;
  font-size: 0.85rem;
}
.page-jump {
  color: var(--text-secondary);
  font-size: 0.82rem;
  margin-left: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.page-input {
  width: 48px;
  height: 28px;
  border: 1px solid var(--border-subtle);
  border-radius: 4px;
  background: var(--bg-card-alt);
  color: var(--text-primary);
  text-align: center;
  font-size: 0.82rem;
  outline: none;
  -moz-appearance: textfield;
}
.page-input::-webkit-outer-spin-button,
.page-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.page-size-select {
  height: 28px;
  border: 1px solid var(--border-subtle);
  border-radius: 4px;
  background: var(--bg-card-alt);
  color: var(--text-primary);
  font-size: 0.82rem;
  outline: none;
  cursor: pointer;
  margin-left: 8px;
}
.page-info {
  color: var(--text-muted);
  font-size: 0.78rem;
  margin-left: 8px;
}
/* ============ Backtest ============ */
.backtest-form {
  margin-top: 16px;
}
.backtest-form-row {
  display: flex;
  gap: 16px;
  margin-bottom: 14px;
}
.backtest-field {
  flex: 1;
}
.backtest-field label {
  display: block;
  font-size: 0.82rem;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.backtest-field input {
  width: 100%;
  height: 40px;
  padding: 0 12px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  background: var(--bg-card-alt);
  color: var(--text-primary);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.88rem;
  outline: none;
  transition: var(--transition);
}
.backtest-field input:focus {
  border-color: var(--border-gold);
  box-shadow: 0 0 8px rgba(212,167,69,0.12);
}
.backtest-field input::placeholder {
  color: var(--text-muted);
  font-size: 0.8rem;
}
.backtest-field .count-selector {
  display: flex;
  align-items: center;
  gap: 0;
  height: 40px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.backtest-field .count-btn {
  width: 40px; height: 40px;
  border: none;
  background: transparent;
  color: var(--text-primary);
  font-size: 1.2rem;
  cursor: pointer;
  transition: var(--transition);
}
.backtest-field .count-btn:hover { background: rgba(255,255,255,0.05); }
.backtest-field .count-display {
  min-width: 32px;
  text-align: center;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--gold-light);
}
.bt-result-card {
  background: var(--bg-card-alt);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 20px;
  margin-top: 20px;
}
.bt-result-header {
  text-align: center;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border-gold);
}
.bt-result-header h3 {
  font-family: 'Noto Serif SC', serif;
  color: var(--gold-light);
  font-size: 1.1rem;
  margin-bottom: 8px;
}
.bt-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.bt-stat-item {
  text-align: center;
  padding: 12px 8px;
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
}
.bt-stat-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.bt-stat-value {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--gold-light);
}
.bt-stat-value.negative { color: var(--crimson-light); }
.bt-history-item {
  background: var(--bg-card-alt);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: var(--transition);
}
.bt-history-item:hover { border-color: var(--border-gold); }
.bt-history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.bt-history-header span:first-child {
  font-weight: 600;
  color: var(--text-primary);
}
.bt-history-meta {
  font-size: 0.8rem;
  color: var(--text-secondary);
  display: flex;
  gap: 16px;
}
@media (max-width: 640px) {
  .backtest-form-row { flex-direction: column; gap: 10px; }
  .bt-stats { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-particles" id="particles"></div>

<div class="app-container">
  <!-- ===== Header ===== -->
  <header class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </div>
    <h1>双色球 · 智能机选</h1>
    <p class="subtitle">基于历史数据 · 策略选号</p>
    <div class="user-area" id="userArea">
      <button class="btn-auth" onclick="openAuth()">登录 / 注册</button>
    </div>
  </header>

  <!-- ===== Win Ticker ===== -->
  <div class="win-ticker-section" id="winTickerSection">
    <div class="win-ticker-title">🏆 全站中奖榜</div>
    <div class="win-ticker-wrapper">
      <div class="win-ticker" id="winTicker">
        <div class="win-ticker-empty">暂无中奖记录</div>
      </div>
    </div>
  </div>

  <!-- ===== Tab Navigation ===== -->
  <div class="main-tabs">
    <button class="main-tab active" data-tab="pick" onclick="switchMainTab('pick')">智能机选</button>
    <button class="main-tab" data-tab="mypicks" onclick="switchMainTab('mypicks')">我的机选记录</button>
    <button class="main-tab" data-tab="mywins" onclick="switchMainTab('mywins')">我的中奖记录</button>
    <button class="main-tab" data-tab="backtest" onclick="switchMainTab('backtest')">回测</button>
  </div>

  <!-- ===== Tab: 智能机选 ===== -->
  <div class="tab-content active" id="tabPick">
    <div class="section" id="pickSection">
      <div class="section-title"><span class="dot"></span>智能机选</div>
      <div class="pick-controls">
        <div class="count-selector">
          <button class="count-btn" onclick="changeCount(-1)" aria-label="减少注数">−</button>
          <span class="count-value" id="countDisplay">5</span>
          <span class="count-label">注</span>
          <button class="count-btn" onclick="changeCount(1)" aria-label="增加注数">+</button>
        </div>
        <button class="btn-generate" id="btnGenerate" onclick="generatePicks()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          开始机选
        </button>
        <div class="lucky-input-wrap">
          <input type="text" class="lucky-input" id="luckyInput" placeholder="输入幸运字符（可选）" maxlength="30" autocomplete="off" />
          <button class="lucky-clear" id="luckyClear" onclick="clearLuckyInput()" title="清除">&times;</button>
          <div class="lucky-dropdown" id="luckyDropdown"></div>
        </div>
      </div>
      <div class="strategy-info" id="strategyInfo"></div>
      <div class="ball-display" id="ballDisplay">
        <div class="empty-state">
          <div class="empty-state-icon">🎱</div>
          <p>点击「开始机选」生成幸运号码</p>
        </div>
      </div>
    </div>

    <!-- ===== History Section ===== -->
    <div class="section" id="historySection">
      <div class="section-title"><span class="dot"></span>近50期开奖结果</div>
      <div id="historyContent">
        <div class="loading-overlay">
          <div class="spinner"></div>
          <span class="loading-text">正在获取开奖数据...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Tab: 我的机选记录 ===== -->

<script>
// ============ Config ============
const BACKEND_URL = '__BACKEND_URL__'; // 构建时由环境变量注入

// ============ State ============
let historyData = [];
let pickCount = 5;
let isLoadingHistory = true;
let historyLoadError = null;

// Auth state
let authToken = localStorage.getItem('lottery_token') || '';
let currentUser = localStorage.getItem('lottery_username') || '';

// ============ Background Particles ============
(function initParticles() {
  const container = document.getElementById('particles');
  const colors = ['rgba(212,167,69,0.5)', 'rgba(192,57,43,0.3)', 'rgba(74,144,217,0.3)'];
  for (let i = 0; i < 30; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    const size = Math.random() * 3 + 1;
    particle.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      background: ${colors[Math.floor(Math.random() * 3)]};
      animation-duration: ${Math.random() * 15 + 10}s;
      animation-delay: ${Math.random() * 15}s;
    `;
    container.appendChild(particle);
  }
})();

// ============ Toast ============
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ============ Count Selector ============
function changeCount(delta) {
  pickCount = Math.max(1, Math.min(20, pickCount + delta));
  document.getElementById('countDisplay').textContent = pickCount;
}

// ============ Lucky Input ============
const LUCKY_STORAGE_KEY = 'luckyHistory';

function getLuckyHistory() {
  try {
    return JSON.parse(localStorage.getItem(LUCKY_STORAGE_KEY) || '[]');
  } catch { return []; }
}

function saveLuckyHistory(str) {
  if (!str) return;
  let list = getLuckyHistory();
  list = list.filter(s => s !== str);
  list.unshift(str);
  if (list.length > 20) list = list.slice(0, 20);
  localStorage.setItem(LUCKY_STORAGE_KEY, JSON.stringify(list));
}

function removeLuckyHistory(str) {
  let list = getLuckyHistory();
  list = list.filter(s => s !== str);
  localStorage.setItem(LUCKY_STORAGE_KEY, JSON.stringify(list));
  showLuckyDropdown();
}

function showLuckyDropdown() {
  const dropdown = document.getElementById('luckyDropdown');
  const input = document.getElementById('luckyInput');
  const keyword = input.value.trim().toLowerCase();
  let list = getLuckyHistory();

  if (keyword) {
    list = list.filter(s => s.toLowerCase().includes(keyword));
  }

  if (list.length === 0) {
    dropdown.innerHTML = '<div class="lucky-dropdown-empty">暂无历史记录</div>';
  } else {
    dropdown.innerHTML = list.map(s =>
      `<div class="lucky-dropdown-item" onclick="selectLuckyItem(this)" data-value="${escapeHtml(s)}">` +
      `<span class="item-text">${escapeHtml(s)}</span>` +
      `<span class="item-del" onclick="event.stopPropagation();deleteLuckyItem('${escapeHtml(s)}')" title="删除">✕</span>` +
      `</div>`
    ).join('');
  }
  dropdown.classList.add('show');
}

function hideLuckyDropdown() {
  setTimeout(() => {
    const dropdown = document.getElementById('luckyDropdown');
    if (dropdown) dropdown.classList.remove('show');
  }, 150);
}

function selectLuckyItem(el) {
  const input = document.getElementById('luckyInput');
  input.value = el.dataset.value || '';
  updateClearBtn();
  hideLuckyDropdown();
  input.focus();
}

function deleteLuckyItem(str) {
  removeLuckyHistory(str);
}

function clearLuckyInput() {
  const input = document.getElementById('luckyInput');
  input.value = '';
  updateClearBtn();
  input.focus();
  showLuckyDropdown();
}

function updateClearBtn() {
  const input = document.getElementById('luckyInput');
  const clearBtn = document.getElementById('luckyClear');
  clearBtn.classList.toggle('visible', input.value.length > 0);
}

// ============ Auth ============
function isLoggedIn() { return !!authToken; }

async function authFetch(url, options = {}) {
  const res = await fetch(url, options);
  if (res.status === 401) {
    showSessionExpiredModal();
    throw new Error('SESSION_EXPIRED');
  }
  return res;
}

function showSessionExpiredModal() {
  const overlay = document.createElement('div');
  overlay.className = 'session-modal-overlay';
  overlay.innerHTML = `
    <div class="session-modal">
      <p>登录已过期，请重新登录</p>
      <button onclick="this.closest('.session-modal-overlay').remove(); logout();">确认</button>
    </div>
  `;
  document.body.appendChild(overlay);
}

function switchMainTab(tab) {
  document.querySelectorAll('.main-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  const tabIdMap = { pick: 'tabPick', mypicks: 'tabMyPicks', mywins: 'tabMyWins', backtest: 'tabBacktest' };
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === tabIdMap[tab]));

  if (tab === 'mypicks') {
    if (isLoggedIn()) { loadMyPicks(); }
    else { showToast('请先登录后查看机选记录'); openAuth(); }
  }
  if (tab === 'mywins') {
    if (isLoggedIn()) { loadMyWins(); }
    else { showToast('请先登录后查看中奖记录'); openAuth(); }
  }
  if (tab === 'backtest') {
    initBacktestDates();
    if (isLoggedIn()) loadBacktestHistory();
  }
}

function openAuth() {
  document.getElementById('authOverlay').classList.add('active');
  document.getElementById('loginError').textContent = '';
  document.getElementById('regError').textContent = '';
}

function closeAuth() {
  document.getElementById('authOverlay').classList.remove('active');
}

function closeAuthOutside(e) {
  if (e.target === document.getElementById('authOverlay')) closeAuth();
}

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('loginForm').classList.toggle('active', tab === 'login');
  document.getElementById('registerForm').classList.toggle('active', tab === 'register');
  document.getElementById('loginError').textContent = '';
  document.getElementById('regError').textContent = '';
}

async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');

  if (!username || !password) { errEl.textContent = '请填写用户名和密码'; return; }

  try {
    const res = await fetch(`${BACKEND_URL}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || '登录失败'; return; }

    authToken = data.token;
    currentUser = data.username;
    localStorage.setItem('lottery_token', authToken);
    localStorage.setItem('lottery_username', currentUser);
    updateUserUI();
    closeAuth();
    showToast(`欢迎回来，${currentUser}`);
  } catch (err) {
    errEl.textContent = '网络错误，请稍后重试';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  const errEl = document.getElementById('regError');

  if (!username || !password) { errEl.textContent = '请填写用户名和密码'; return; }

  try {
    const res = await fetch(`${BACKEND_URL}/api/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || '注册失败'; return; }

    showToast('注册成功，请登录');
    switchAuthTab('login');
    document.getElementById('loginUsername').value = username;
    document.getElementById('loginPassword').value = '';
  } catch (err) {
    errEl.textContent = '网络错误，请稍后重试';
  }
}

function logout() {
  authToken = '';
  currentUser = '';
  localStorage.removeItem('lottery_token');
  localStorage.removeItem('lottery_username');
  updateUserUI();
  showToast('已退出登录');
  document.getElementById('myPicksDisplay').innerHTML = '';
  document.getElementById('myWinsDisplay').innerHTML = '';
  document.getElementById('backtestResult').innerHTML = '';
  document.getElementById('backtestHistory').innerHTML = '';
  switchMainTab('pick');
}

function updateUserUI() {
  const area = document.getElementById('userArea');
  if (isLoggedIn()) {
    area.innerHTML = `
      <span class="user-name">👤 ${currentUser}</span>
      <button class="btn-logout" onclick="logout()">退出</button>`;
  } else {
    area.innerHTML = '<button class="btn-auth" onclick="openAuth()">登录 / 注册</button>';
  }
}

// ============ Fetch current issue ============
function getLatestIssue() {
  if (historyData.length === 0) return '';
  // The latest item in historyData is the most recent draw
  // API returns items newest first. We need the next issue number.
  // huiniao.top's last.next_code is the upcoming issue
  // Since we don't fetch `last` from the list, we calculate it:
  // The latest result's code + 1 (rough approximation)
  const latest = historyData[0];
  if (!latest || !latest.issue) return '';
  const issueNum = parseInt(latest.issue, 10);
  if (isNaN(issueNum)) return '';
  return String(issueNum + 1);
}

// ============ Pick History ============
let picksPage = 1;
let picksPageSize = 20;
let picksTotal = 0;

function renderPicksData(data) {
  const issueGroups = {};
  const issueOrder = [];
  data.forEach(batch => {
    if (!issueGroups[batch.issue]) {
      issueGroups[batch.issue] = [];
      issueOrder.push(batch.issue);
    }
    issueGroups[batch.issue].push(batch);
  });

  let html = '';
  issueOrder.forEach(issue => {
    const batches = issueGroups[issue];
    const totalBatches = batches.length;
    html += `<div class="issue-group">
      <div class="issue-group-header"><span>第${issue}期</span><button class="btn-calc" id="calcBtn_${issue}" onclick="calculateWins('${issue}')">当期算奖</button></div>`;
    batches.forEach((batch, batchIdx) => {
      const batchNum = totalBatches - batchIdx;
      html += `<div class="batch-card">
        <div class="batch-label">批次${batchNum}${batch.luckySeed ? ' · 🔮' + escapeHtml(batch.luckySeed) : ''} · ${batch.createdAt?.slice(0,10) || ''}</div>`;
      batch.tickets.forEach((t, i) => {
        html += '<div class="mini-row"><span class="ticket-index">第' + (i+1) + '注</span>';
        t.reds.forEach(r => {
          html += `<span class="mini-ball mini-ball-red">${String(r).padStart(2,'0')}</span>`;
        });
        html += '+';
        html += `<span class="mini-ball mini-ball-blue">${String(t.blue).padStart(2,'0')}</span>`;
        html += '</div>';
      });
      html += '</div>';
    });
    html += '</div>';
  });
  return html;
}

function renderPicksPagination() {
  const totalPages = Math.max(1, Math.ceil(picksTotal / picksPageSize));
  const current = Math.min(picksPage, totalPages);
  let pages = [];
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) pages.push(i);
  } else {
    pages.push(1);
    if (current > 3) pages.push('...');
    for (let i = Math.max(2, current - 1); i <= Math.min(totalPages - 1, current + 1); i++) pages.push(i);
    if (current < totalPages - 2) pages.push('...');
    pages.push(totalPages);
  }

  let html = '<div class="pagination">';
  html += `<button class="page-btn" onclick="goPicksPage(1)" ${current <= 1 ? 'disabled' : ''}>&laquo;</button>`;
  html += `<button class="page-btn" onclick="goPicksPage(${current - 1})" ${current <= 1 ? 'disabled' : ''}>&lsaquo;</button>`;
  pages.forEach(p => {
    if (p === '...') {
      html += '<span class="page-ellipsis">...</span>';
    } else {
      html += `<button class="page-btn${p === current ? ' active' : ''}" onclick="goPicksPage(${p})">${p}</button>`;
    }
  });
  html += `<button class="page-btn" onclick="goPicksPage(${current + 1})" ${current >= totalPages ? 'disabled' : ''}>&rsaquo;</button>`;
  html += `<button class="page-btn" onclick="goPicksPage(${totalPages})" ${current >= totalPages ? 'disabled' : ''}>&raquo;</button>`;
  html += '<span class="page-jump">跳至 <input type="number" class="page-input" id="picksPageInput" min="1" max="' + totalPages + '" value="' + current + '" onkeydown="if(event.key===\'Enter\')goPicksPage(Number(this.value))" /> 页</span>';
  html += '<select class="page-size-select" onchange="changePicksPageSize(Number(this.value))">';
  [10, 20, 50, 100].forEach(s => {
    html += `<option value="${s}" ${s === picksPageSize ? 'selected' : ''}>${s}条/页</option>`;
  });
  html += '</select>';
  html += `<span class="page-info">共 ${picksTotal} 条</span>`;
  html += '</div>';
  return html;
}

async function loadMyPicks() {
  const container = document.getElementById('myPicksDisplay');
  if (!isLoggedIn()) { container.innerHTML = ''; return; }

  try {
    const res = await authFetch(`${BACKEND_URL}/api/picks?page=${picksPage}&limit=${picksPageSize}`, {
      headers: { 'Authorization': `Bearer ${authToken}` },
    });
    if (res.status === 401) return;
    const json = await res.json();
    picksTotal = json.total || 0;

    if (!json.data || json.data.length === 0) {
      container.innerHTML = '<div class="empty-state"><p>暂无历史机选记录</p></div>';
      return;
    }

    container.innerHTML = renderPicksData(json.data) + renderPicksPagination();
  } catch (err) {
    if (err.message === 'SESSION_EXPIRED') return;
    console.error('Load picks error:', err);
  }
}

function goPicksPage(page) {
  const totalPages = Math.max(1, Math.ceil(picksTotal / picksPageSize));
  picksPage = Math.max(1, Math.min(totalPages, page));
  loadMyPicks();
}

function changePicksPageSize(size) {
  picksPageSize = Math.min(100, Math.max(1, size));
  picksPage = 1;
  loadMyPicks();
}

// ============ Calculate Wins ============
async function calculateWins(issue) {
  const btn = document.getElementById('calcBtn_' + issue);
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = '计算中...';

  try {
    const res = await authFetch(`${BACKEND_URL}/api/wins/calculate`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`,
      },
      body: JSON.stringify({ issue }),
    });
    const json = await res.json();

    if (!res.ok) {
      btn.disabled = false;
      btn.textContent = '当期算奖';
      showToast(json.error || '计算失败');
      return;
    }

    btn.textContent = '已算奖';
    btn.classList.add('calc-done');

    showCalcResultModal(json);
  } catch (err) {
    btn.disabled = false;
    btn.textContent = '当期算奖';
    if (err.message === 'SESSION_EXPIRED') return;
    showToast('计算失败，请稍后重试');
  }
}

function showCalcResultModal(data) {
  const winReds = data.winReds || [];
  const winBlue = data.winBlue;
  const results = data.results || [];

  let html = `<div class="calc-modal-content">`;
  // 开奖号码
  html += `<div class="calc-draw-row"><span class="calc-draw-label">开奖号码</span>`;
  winReds.forEach(r => {
    html += `<span class="mini-ball mini-ball-red">${String(r).padStart(2,'0')}</span>`;
  });
  html += '+';
  html += `<span class="mini-ball mini-ball-blue">${String(winBlue).padStart(2,'0')}</span>`;
  html += '</div>';

  // 统计
  html += `<div class="calc-stats">共${data.total}注 · 中奖${data.wins}注 · 未中奖${data.noWin}注</div>`;

  if (results.length === 0) {
    html += '<div class="calc-empty">暂无中奖</div>';
  } else {
    results.forEach((w, idx) => {
      html += `<div class="calc-result-card">`;
      html += `<div class="calc-result-header"><span>第${idx+1}注</span><span class="prize-badge level-${w.prizeLevel}">${w.prizeName}</span></div>`;
      html += `<div class="calc-result-amount">奖金：${w.prizeAmountText}</div>`;
      html += `<div class="calc-result-match">命中：${w.redMatch}红+${w.blueMatch}蓝</div>`;
      // 号码行：命中的红球高亮
      html += '<div class="balls-row">';
      w.reds.forEach(r => {
        const matched = winReds.includes(r);
        html += `<span class="mini-ball mini-ball-red${matched ? ' ball-matched' : ''}">${String(r).padStart(2,'0')}</span>`;
      });
      html += '+';
      const blueMatched = w.blue === winBlue;
      html += `<span class="mini-ball mini-ball-blue${blueMatched ? ' ball-matched' : ''}">${String(w.blue).padStart(2,'0')}</span>`;
      html += '</div>';
      html += '</div>';
    });
  }

  html += `<div class="calc-modal-footer"><button class="calc-close-btn" onclick="this.closest('.calc-modal-overlay').remove()">关闭</button></div>`;
  html += '</div>';

  const overlay = document.createElement('div');
  overlay.className = 'calc-modal-overlay';
  overlay.innerHTML = html;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ============ Save Picks to Backend ============
async function savePicksToBackend(tickets, luckySeed) {
  const issue = getLatestIssue();
  if (!issue) { showToast('无法确定当前期号，结果未保存'); return; }

  try {
    const res = await authFetch(`${BACKEND_URL}/api/picks`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`,
      },
      body: JSON.stringify({ issue, tickets, luckySeed: luckySeed || undefined }),
    });
    if (res.ok) {
      // Reload pick history if on mypicks tab
      const myPicksTab = document.getElementById('tabMyPicks');
      if (myPicksTab.classList.contains('active')) {
        setTimeout(() => loadMyPicks(), 500);
      }
    }
  } catch (err) {
    if (err.message === 'SESSION_EXPIRED') return;
    console.error('Save picks error:', err);
  }
}

// ============ Seeded Random ============
function hashString(str) {
  let hash = 5381;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) + hash + str.charCodeAt(i)) | 0;
  }
  return hash >>> 0;
}

function createRNG(seed) {
  // mulberry32 PRNG — deterministic, high-quality
  let s = seed | 0;
  return function () {
    s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ============ Fetch History Data ============
async function fetchHistoryData() {
  const API_URL = 'https://api.huiniao.top/interface/home/lotteryHistory';
  const params = new URLSearchParams({ type: 'ssq', page: '1', limit: '50' });

  const response = await fetch(`${API_URL}?${params}`);
  if (!response.ok) {
    throw new Error(`HTTP ${response.status}: 请求失败`);
  }
  const json = await response.json();
  if (json.code !== 1 || !json.data || !json.data.data || !json.data.data.list) {
    throw new Error(json.info || '接口返回数据异常');
  }
  return json.data.data.list;
}

// ============ Parse History Data ============
function parseHistoryData(rawResults) {
  return rawResults.map((item) => {
    const redBalls = [];
    // huiniao.top API: one~six are red balls, seven is blue ball
    const fields = ['one', 'two', 'three', 'four', 'five', 'six'];
    fields.forEach(f => {
      const num = parseInt(item[f], 10);
      if (!isNaN(num)) redBalls.push(num);
    });
    const blueBall = parseInt(item.seven, 10) || 0;
    return {
      issue: item.code || '',
      date: item.day || '',
      reds: redBalls,
      blue: blueBall,
    };
  }).filter(item => item.reds.length === 6 && item.blue > 0);
}

// ============ Smart Selection Strategy ============
function analyzeHistory() {
  if (historyData.length === 0) return null;

  const totalDraws = historyData.length;

  // Count red ball frequency (1-33)
  const redFreq = {};
  const redLastSeen = {};
  for (let i = 1; i <= 33; i++) {
    redFreq[i] = 0;
    redLastSeen[i] = totalDraws; // not seen at all
  }

  // Count blue ball frequency (1-16)
  const blueFreq = {};
  const blueLastSeen = {};
  for (let i = 1; i <= 16; i++) {
    blueFreq[i] = 0;
    blueLastSeen[i] = totalDraws;
  }

  // Analyze each draw (most recent = index 0)
  historyData.forEach((draw, idx) => {
    draw.reds.forEach(r => {
      redFreq[r] = (redFreq[r] || 0) + 1;
      if (redLastSeen[r] === totalDraws) redLastSeen[r] = idx;
    });
    const b = draw.blue;
    blueFreq[b] = (blueFreq[b] || 0) + 1;
    if (blueLastSeen[b] === totalDraws) blueLastSeen[b] = idx;
  });

  return { redFreq, redLastSeen, blueFreq, blueLastSeen, totalDraws };
}

function calculateScore(freq, lastSeen, totalDraws, rng) {
  // Frequency score: higher frequency = higher score
  const freqScore = freq / totalDraws;
  // Recency score: recently seen = some bonus, long gap = higher chance (gambler's fallacy inspired)
  const recencyScore = lastSeen === totalDraws ? 1.0 : (lastSeen / totalDraws) * 0.8 + 0.2;
  // Combine: 50% frequency (hot numbers), 30% recency (cold has higher chance), 20% random
  return freqScore * 0.5 + recencyScore * 0.3 + rng() * 0.2;
}

function smartPickReds(analysis, count, rng) {
  const { redFreq, redLastSeen, totalDraws } = analysis;
  const candidates = [];

  for (let i = 1; i <= 33; i++) {
    const score = calculateScore(redFreq[i], redLastSeen[i], totalDraws, rng);
    candidates.push({ num: i, score });
  }

  // Sort by score descending, pick from top candidates with some randomness
  candidates.sort((a, b) => b.score - a.score);

  // Weighted random selection from the top 25 candidates
  const pool = candidates.slice(0, 25);
  const selected = new Set();

  while (selected.size < count) {
    const prevSize = selected.size;
    const totalWeight = pool.reduce((sum, c) => sum + c.score, 0);
    let rand = rng() * totalWeight;
    for (const c of pool) {
      rand -= c.score;
      if (rand <= 0 && !selected.has(c.num)) {
        selected.add(c.num);
        break;
      }
    }
    // Fallback: if weighted selection didn't add a new number, force-add the first available
    if (selected.size === prevSize) {
      for (const c of pool) {
        if (!selected.has(c.num)) {
          selected.add(c.num);
          break;
        }
      }
    }
  }

  return [...selected].sort((a, b) => a - b);
}

function smartPickBlue(analysis, rng) {
  const { blueFreq, blueLastSeen, totalDraws } = analysis;
  const candidates = [];

  for (let i = 1; i <= 16; i++) {
    const score = calculateScore(blueFreq[i], blueLastSeen[i], totalDraws, rng);
    candidates.push({ num: i, score });
  }

  candidates.sort((a, b) => b.score - a.score);

  // Weighted random from top 12
  const pool = candidates.slice(0, 12);
  const totalWeight = pool.reduce((sum, c) => sum + c.score, 0);
  let rand = rng() * totalWeight;
  for (const c of pool) {
    rand -= c.score;
    if (rand <= 0) return c.num;
  }
  return pool[0].num;
}

// ============ Generate Picks ============
function generatePicks() {
  const btn = document.getElementById('btnGenerate');
  const display = document.getElementById('ballDisplay');
  const strategyInfo = document.getElementById('strategyInfo');

  if (!isLoggedIn()) {
    showToast('请先登录后再使用机选功能');
    openAuth();
    return;
  }

  if (historyData.length === 0) {
    showToast('请先等待历史数据加载完成');
    return;
  }

  // Button animation
  btn.classList.add('loading');
  setTimeout(() => btn.classList.remove('loading'), 600);

  // Get lucky seed
  const luckyStr = document.getElementById('luckyInput').value.trim();
  updateClearBtn();

  // Save lucky string to history
  if (luckyStr) saveLuckyHistory(luckyStr);

  let baseSeed = Date.now();
  let rng = null;
  let seedTag = '';
  if (luckyStr.length > 0) {
    const hash = hashString(luckyStr);
    baseSeed = hash;
    seedTag = `<span class="strategy-badge">🔮 幸运种子：${escapeHtml(luckyStr)}</span>`;
  } else {
    seedTag = '<span class="strategy-badge">🔀 随机种子：时间戳</span>';
  }

  const analysis = analyzeHistory();
  if (!analysis) {
    showToast('暂无足够的历史数据进行分析');
    return;
  }

  const tickets = [];
  for (let i = 0; i < pickCount; i++) {
    // Create a new RNG each iteration with derived seed for independence
    const stepSeed = baseSeed + i * 911382629;
    rng = luckyStr.length > 0 ? createRNG(stepSeed) : Math.random;
    const reds = smartPickReds(analysis, 6, rng);
    const blue = smartPickBlue(analysis, rng);
    tickets.push({ reds, blue });
  }

  // Render strategy info
  const hotReds = Object.entries(analysis.redFreq)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 5)
    .map(([n]) => n);
  const hotBlues = Object.entries(analysis.blueFreq)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3)
    .map(([n]) => n);

  strategyInfo.innerHTML = `
    <span class="strategy-badge">📊 分析期数：${analysis.totalDraws}期</span>
    <span class="strategy-badge">🔥 红球热号：${hotReds.join('、')}</span>
    <span class="strategy-badge">💎 蓝球热号：${hotBlues.join('、')}</span>
    <span class="strategy-badge">🎯 选号策略：热度+冷号加权随机</span>
    ${seedTag}
  `;

  // Render balls
  let html = '';
  tickets.forEach((ticket, idx) => {
    html += `<div class="ticket-group">
      <div class="ticket-label">第 ${idx + 1} 注</div>
      <div class="balls-row">`;
    ticket.reds.forEach((r, ri) => {
      html += `<span class="ball ball-red" style="animation-delay:${ri * 0.06 + idx * 0.08}s">${String(r).padStart(2, '0')}</span>`;
    });
    html += `<span class="ball-divider">+</span>`;
    html += `<span class="ball ball-blue" style="animation-delay:${6 * 0.06 + idx * 0.08}s">${String(ticket.blue).padStart(2, '0')}</span>`;
    html += `</div></div>`;
  });

  display.innerHTML = html;
  if (luckyStr.length > 0) {
    showToast(`已为「${luckyStr}」生成 ${pickCount} 注号码`);
  } else {
    showToast(`已生成 ${pickCount} 注号码`);
  }

  // Save to backend
  savePicksToBackend(tickets, luckyStr.length > 0 ? luckyStr : undefined);
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, function(m) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]);
  });
}

let winsPage = 1;
let winsPageSize = 20;
let winsTotal = 0;

function renderWinsData(data) {
  const issueGroups = {};
  const issueOrder = [];
  data.forEach(w => {
    if (!issueGroups[w.issue]) {
      issueGroups[w.issue] = [];
      issueOrder.push(w.issue);
    }

  });

  issueOrder.forEach(issue => {
    const wins = issueGroups[issue];
    html += `<div class="issue-group">
      <div class="issue-group-header">第${issue}期</div>`;
    wins.forEach(w => {
      html += `<div class="win-card">
        <div class="win-card-header">
          <span class="issue">第${w.issue}期</span>
          <span class="prize-badge level-${w.prizeLevel}">${w.prizeName}</span>
        </div>
        <div class="amount">奖金：${w.prizeAmountText}</div>
        <div class="match-info">命中：${w.redMatch}红+${w.blueMatch}蓝</div>
        <div class="balls-row">
          <span style="font-size:0.75rem;color:var(--text-muted);margin-right:4px;">选号:</span>`;
      w.reds.forEach(r => {
        html += `<span class="mini-ball mini-ball-red">${String(r).padStart(2, '0')}</span>`;
      });
      html += '+';
      html += `<span class="mini-ball mini-ball-blue">${String(w.blue).padStart(2, '0')}</span>`;
      html += '</div></div>';
    });
    html += '</div>';
  });
  return html;
}

function renderWinsPagination() {
  const totalPages = Math.max(1, Math.ceil(winsTotal / winsPageSize));
  const current = Math.min(winsPage, totalPages);
  let pages = [];
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) pages.push(i);
  } else {
    pages.push(1);
    if (current > 3) pages.push('...');
    for (let i = Math.max(2, current - 1); i <= Math.min(totalPages - 1, current + 1); i++) pages.push(i);
    if (current < totalPages - 2) pages.push('...');
    pages.push(totalPages);
  }

  let html = '<div class="pagination">';
  html += `<button class="page-btn" onclick="goWinsPage(1)" ${current <= 1 ? 'disabled' : ''}>&laquo;</button>`;
  html += `<button class="page-btn" onclick="goWinsPage(${current - 1})" ${current <= 1 ? 'disabled' : ''}>&lsaquo;</button>`;
  pages.forEach(p => {
    if (p === '...') {
      html += '<span class="page-ellipsis">...</span>';
    } else {
      html += `<button class="page-btn${p === current ? ' active' : ''}" onclick="goWinsPage(${p})">${p}</button>`;
    }
  });
  html += `<button class="page-btn" onclick="goWinsPage(${current + 1})" ${current >= totalPages ? 'disabled' : ''}>&rsaquo;</button>`;
  html += `<button class="page-btn" onclick="goWinsPage(${totalPages})" ${current >= totalPages ? 'disabled' : ''}>&raquo;</button>`;
  html += '<span class="page-jump">跳至 <input type="number" class="page-input" id="winsPageInput" min="1" max="' + totalPages + '" value="' + current + '" onkeydown="if(event.key===\'Enter\')goWinsPage(Number(this.value))" /> 页</span>';
  html += '<select class="page-size-select" onchange="changeWinsPageSize(Number(this.value))">';
  [10, 20, 50, 100].forEach(s => {
    html += `<option value="${s}" ${s === winsPageSize ? 'selected' : ''}>${s}条/页</option>`;
  });
  html += '</select>';
  html += `<span class="page-info">共 ${winsTotal} 条</span>`;
  html += '</div>';
  return html;
}

async function loadMyWins() {
  const container = document.getElementById('myWinsDisplay');
  if (!isLoggedIn()) { container.innerHTML = ''; return; }

  try {
    const res = await authFetch(`${BACKEND_URL}/api/wins/mine?page=${winsPage}&limit=${winsPageSize}`, {
      headers: { 'Authorization': `Bearer ${authToken}` },
    });
    if (res.status === 401) return;
    const json = await res.json();
    winsTotal = json.total || 0;

    if (!json.data || json.data.length === 0) {
      container.innerHTML = '<div class="empty-state"><p>暂无中奖记录</p></div>';
      return;
    }

    container.innerHTML = renderWinsData(json.data) + renderWinsPagination();
  } catch (err) {
    if (err.message === 'SESSION_EXPIRED') return;
    console.error('Load my wins error:', err);
  }
}

function goWinsPage(page) {
  const totalPages = Math.max(1, Math.ceil(winsTotal / winsPageSize));
  winsPage = Math.max(1, Math.min(totalPages, page));
  loadMyWins();
}

function changeWinsPageSize(size) {
  winsPageSize = Math.min(100, Math.max(1, size));
  winsPage = 1;
  loadMyWins();
}

        <div class="bt-stats" style="margin-bottom:16px;">
          <div class="bt-stat-item"><div class="bt-stat-label">中奖金额</div><div class="bt-stat-value">${bt.totalPrizeAmountText}</div></div>
          <div class="bt-stat-item"><div class="bt-stat-label">下注金额</div><div class="bt-stat-value">${bt.totalBetAmountText}</div></div>
          <div class="bt-stat-item"><div class="bt-stat-label">中奖注数</div><div class="bt-stat-value">${bt.totalWins}/${bt.totalPicks}</div></div>
        </div>`;

    issueOrder.forEach(issue => {
      const details = issueGroups[issue];
      const winReds = details[0]?.winReds || [];
      const winBlue = details[0]?.winBlue || 0;

      html += `<div class="issue-group">
        <div class="issue-group-header"><span>第${issue}期</span><span style="font-size:0.78rem;color:var(--text-secondary);">开奖: `;
      winReds.forEach(r => {
        html += `<span class="mini-ball mini-ball-red" style="width:22px;height:22px;line-height:22px;font-size:0.68rem;">${String(r).padStart(2,'0')}</span>`;
      });
      html += `<span class="mini-ball mini-ball-blue" style="width:22px;height:22px;line-height:22px;font-size:0.68rem;">${String(winBlue).padStart(2,'0')}</span>`;
      html += `</span></div>`;

      details.forEach(d => {
        if (d.prizeLevel > 0) {
          html += `<div class="calc-result-card">`;
          html += `<div class="calc-result-header"><span>选号</span><span class="prize-badge level-${d.prizeLevel}">${d.prizeName}</span></div>`;
          html += `<div class="calc-result-amount">奖金：${d.prizeAmountText}</div>`;
        } else {
          html += `<div class="batch-card" style="padding:10px 14px;">`;
          html += `<div class="batch-label">未中奖</div>`;
        }
        html += '<div class="balls-row">';
        d.reds.forEach(r => {
          const matched = winReds.includes(r);
          html += `<span class="mini-ball mini-ball-red${matched ? ' ball-matched' : ''}" style="width:24px;height:24px;line-height:24px;font-size:0.7rem;">${String(r).padStart(2,'0')}</span>`;
        });
        html += '+';
        const blueMatched = d.blue === winBlue;
        html += `<span class="mini-ball mini-ball-blue${blueMatched ? ' ball-matched' : ''}" style="width:24px;height:24px;line-height:24px;font-size:0.7rem;">${String(d.blue).padStart(2,'0')}</span>`;
        html += '</div></div>';
      });
      html += '</div>';
    });

    html += `<div class="calc-modal-footer"><button class="calc-close-btn" onclick="this.closest('.calc-modal-overlay').remove()">关闭</button></div>`;
    html += '</div></div>';

    const overlay = document.createElement('div');
    overlay.innerHTML = html;
    document.body.appendChild(overlay.firstElementChild);
  } catch (err) {
    if (err.message === 'SESSION_EXPIRED') return;
    showToast('获取回测详情失败');
  }
}

// ============ Init ============
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('luckyInput');
  input.addEventListener('input', () => { updateClearBtn(); showLuckyDropdown(); });
  input.addEventListener('focus', showLuckyDropdown);
  input.addEventListener('blur', hideLuckyDropdown);
  updateClearBtn();

  // Restore auth state
  updateUserUI();

  loadHistory();
  loadPublicWins();
});
</script>
</body>
</html>
