<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双色球 · 智能机选</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,500&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ============ CSS Variables & Reset ============ */
:root {
  --bg-deep: #0a0a14;
  --bg-card: #12122a;
  --bg-card-alt: #1a1a38;
  --gold: #d4a745;
  --gold-light: #f0d68a;
  --gold-dark: #a07828;
  --crimson: #c0392b;
  --crimson-light: #e74c3c;
  --blue-accent: #4a90d9;
  --blue-ball: #2980b9;
  --text-primary: #e8e6e0;
  --text-secondary: #9896a8;
  --text-muted: #5e5c72;
  --border-subtle: rgba(255,255,255,0.06);
  --border-gold: rgba(212,167,69,0.3);
  --radius-sm: 8px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --radius-xl: 32px;
  --shadow-gold: 0 0 40px rgba(212,167,69,0.18);
  --shadow-card: 0 8px 40px rgba(0,0,0,0.4);
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ============ Animated Background ============ */
.bg-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.bg-layer::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(212,167,69,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(192,57,43,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(74,144,217,0.03) 0%, transparent 60%);
  animation: bgFloat 20s ease-in-out infinite;
}
@keyframes bgFloat {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(1%, -0.5%) rotate(0.5deg); }
  66% { transform: translate(-0.5%, 1%) rotate(-0.5deg); }
}

.bg-particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.particle {
  position: absolute;
  border-radius: 50%;
  animation: particleFloat linear infinite;
  opacity: 0;
}
@keyframes particleFloat {
  0% { opacity: 0; transform: translateY(100vh) scale(0); }
  10% { opacity: 0.6; }
  90% { opacity: 0.1; }
  100% { opacity: 0; transform: translateY(-10vh) scale(1.2); }
}

/* ============ Main Container ============ */
.app-container {
  position: relative;
  z-index: 1;
  max-width: 880px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* ============ Header ============ */
.header {
  text-align: center;
  margin-bottom: 48px;
}
.header-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, var(--gold-light), var(--gold-dark));
  box-shadow: 0 0 60px rgba(212,167,69,0.3), 0 8px 32px rgba(0,0,0,0.5);
  margin-bottom: 20px;
  animation: iconPulse 3s ease-in-out infinite;
  position: relative;
}
.header-icon::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  opacity: 0.4;
  animation: iconRing 3s ease-in-out infinite;
}
@keyframes iconPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
@keyframes iconRing {
  0%, 100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.15); opacity: 0; }
}
.header-icon svg { width: 36px; height: 36px; fill: #1a1a2e; }

.header h1 {
  font-family: 'Noto Serif SC', 'Playfair Display', serif;
  font-weight: 900;
  font-size: clamp(2rem, 4vw, 2.8rem);
  background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}
.header .subtitle {
  font-family: 'Noto Serif SC', serif;
  font-size: 0.95rem;
  color: var(--text-secondary);
  letter-spacing: 0.12em;
  font-weight: 400;
}

/* ============ Section Cards ============ */
.section {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  margin-bottom: 28px;
  box-shadow: var(--shadow-card);
  position: relative;
  overflow: hidden;
  transition: var(--transition);
}
.section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-gold), transparent);
}
.section:hover {
  border-color: var(--border-gold);
  box-shadow: var(--shadow-card), var(--shadow-gold);
}
.section-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--gold-light);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 10px var(--gold);
}

/* ============ Quick Pick Controls ============ */
.pick-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
  margin-bottom: 28px;
}
.count-selector {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-card-alt);
  border-radius: var(--radius-md);
  padding: 4px;
  border: 1px solid var(--border-subtle);
}
.count-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-primary);
  font-size: 1.2rem;
  cursor: pointer;
  transition: var(--transition);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Sans SC', sans-serif;
}
.count-btn:hover { background: rgba(212,167,69,0.15); color: var(--gold-light); }
.count-btn:active { transform: scale(0.9); }
.count-value {
  min-width: 44px;
  text-align: center;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--gold-light);
  font-family: 'Noto Serif SC', serif;
  user-select: none;
}
.count-label {
  color: var(--text-secondary);
  font-size: 0.85rem;
  margin-left: 6px;
  font-weight: 400;
}

.btn-generate {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 36px;
  border: none;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--crimson), #96281b);
  color: #fff;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 1.05rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.3s ease;
  box-shadow: 0 4px 24px rgba(192,57,43,0.4);
  position: relative;
  overflow: hidden;
}
.btn-generate::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
  transform: translateX(-100%);
  transition: transform 0.6s ease;
}
.btn-generate:hover::after { transform: translateX(100%); }
.btn-generate:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 32px rgba(192,57,43,0.55);
}
.btn-generate:active { transform: translateY(0) scale(0.98); }
.btn-generate.loading { pointer-events: none; opacity: 0.7; }
.btn-generate svg { width: 20px; height: 20px; }

/* ============ Lucky Input ============ */
.lucky-input-wrap {
  position: relative;
  display: flex;
  align-items: center;
  flex: 1;
  min-width: 180px;
  max-width: 280px;
}
.lucky-input {
  width: 100%;
  height: 44px;
  padding: 0 36px 0 16px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  background: var(--bg-card-alt);
  color: var(--text-primary);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: var(--transition);
}
.lucky-input::placeholder {
  color: var(--text-muted);
  font-size: 0.82rem;
}
.lucky-input:focus {
  border-color: var(--border-gold);
  box-shadow: 0 0 12px rgba(212,167,69,0.15);
}
.lucky-clear {
  position: absolute;
  right: 6px;
  width: 28px; height: 28px;
  border: none;
  border-radius: 50%;
  background: transparent;
  color: var(--text-muted);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
  opacity: 0;
  pointer-events: none;
}
.lucky-clear.visible { opacity: 1; pointer-events: auto; }
.lucky-clear:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

/* ============ Lottery Balls ============ */
.ball-display {
  display: flex;
  flex-direction: column;
  gap: 32px;
}
.ticket-group {
  background: var(--bg-card-alt);
  border-radius: var(--radius-md);
  padding: 20px 24px;
  border: 1px solid var(--border-subtle);
  animation: ticketAppear 0.5s ease backwards;
}
.ticket-group:nth-child(1) { animation-delay: 0s; }
.ticket-group:nth-child(2) { animation-delay: 0.08s; }
.ticket-group:nth-child(3) { animation-delay: 0.16s; }
.ticket-group:nth-child(4) { animation-delay: 0.24s; }
.ticket-group:nth-child(5) { animation-delay: 0.32s; }
.ticket-group:nth-child(n+6) { animation-delay: 0.4s; }

@keyframes ticketAppear {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.ticket-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin-bottom: 12px;
  font-weight: 500;
}
.balls-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.ball {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  font-size: 1rem;
  font-family: 'Noto Sans SC', sans-serif;
  color: #fff;
  position: relative;
  box-shadow: inset 0 -3px 6px rgba(0,0,0,0.3), 0 3px 12px rgba(0,0,0,0.3);
  animation: ballPop 0.4s cubic-bezier(0.34,1.56,0.64,1) backwards;
  transition: transform 0.2s ease;
  cursor: default;
}
.ball:hover { transform: scale(1.15); }
.ball-red {
  background: radial-gradient(circle at 35% 30%, #f8716b, #c0392b 60%, #7b1d19);
  box-shadow: inset 0 -3px 6px rgba(0,0,0,0.3), 0 3px 12px rgba(192,57,43,0.4);
}
.ball-blue {
  background: radial-gradient(circle at 35% 30%, #6db3f2, #2471a3 60%, #123a5e);
  box-shadow: inset 0 -3px 6px rgba(0,0,0,0.3), 0 3px 12px rgba(41,128,185,0.5);
}
@keyframes ballPop {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.ball-divider {
  color: var(--text-muted);
  font-size: 1.1rem;
  font-weight: 300;
  margin: 0 2px;
  user-select: none;
}

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
}
.empty-state-icon {
  font-size: 3rem;
  margin-bottom: 12px;
  opacity: 0.5;
}

/* ============ Strategy Badge ============ */
.strategy-info {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.strategy-badge {
  font-size: 0.75rem;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(212,167,69,0.1);
  color: var(--gold-light);
  border: 1px solid rgba(212,167,69,0.2);
  font-weight: 500;
}

/* ============ History Table ============ */
.history-scroll {
  max-height: 560px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-gold) transparent;
  border-radius: var(--radius-sm);
}
.history-scroll::-webkit-scrollbar { width: 4px; }
.history-scroll::-webkit-scrollbar-track { background: transparent; }
.history-scroll::-webkit-scrollbar-thumb {
  background: var(--border-gold);
  border-radius: 2px;
}

.history-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}
.history-table thead {
  position: sticky;
  top: 0;
  z-index: 2;
}
.history-table th {
  background: var(--bg-card);
  color: var(--text-muted);
  font-weight: 600;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  padding: 14px 10px;
  text-align: center;
  border-bottom: 2px solid var(--border-gold);
  white-space: nowrap;
}
.history-table td {
  padding: 12px 6px;
  text-align: center;
  border-bottom: 1px solid var(--border-subtle);
  white-space: nowrap;
  transition: background 0.2s ease;
}
.history-table tbody tr {
  transition: background 0.2s ease;
}
.history-table tbody tr:hover {
  background: rgba(212,167,69,0.05);
}
.history-table tbody tr:nth-child(even) {
  background: rgba(255,255,255,0.015);
}
.history-table tbody tr:nth-child(even):hover {
  background: rgba(212,167,69,0.06);
}
.issue-num {
  font-weight: 600;
  color: var(--text-primary);
  font-family: 'Noto Serif SC', serif;
}
.mini-ball {
  display: inline-block;
  width: 28px; height: 28px;
  line-height: 28px;
  border-radius: 50%;
  text-align: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: #fff;
  margin: 1px;
  vertical-align: middle;
}
.mini-ball-red {
  background: radial-gradient(circle at 35% 30%, #f8716b, #c0392b 60%, #7b1d19);
}
.mini-ball-blue {
  background: radial-gradient(circle at 35% 30%, #6db3f2, #2471a3 60%, #123a5e);
}

/* ============ Loading Spinner ============ */
.loading-overlay {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  flex-direction: column;
  gap: 16px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border-subtle);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  color: var(--text-secondary);
  font-size: 0.9rem;
}

/* ============ Error State ============ */
.error-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--crimson-light);
}
.retry-btn {
  margin-top: 16px;
  padding: 10px 24px;
  border: 1px solid var(--crimson-light);
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--crimson-light);
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.9rem;
  transition: var(--transition);
}
.retry-btn:hover { background: rgba(231,76,60,0.15); }

/* ============ Toast ============ */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-card);
  border: 1px solid var(--border-gold);
  border-radius: var(--radius-md);
  padding: 12px 24px;
  color: var(--gold-light);
  font-size: 0.9rem;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  font-family: 'Noto Sans SC', sans-serif;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ============ Footer ============ */
.footer {
  text-align: center;
  padding: 20px;
  color: var(--text-muted);
  font-size: 0.78rem;
  letter-spacing: 0.05em;
}
.footer a { color: var(--gold); text-decoration: none; }

/* ============ Auth Modal ============ */
.auth-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  backdrop-filter: blur(4px);
}
.auth-overlay.active { opacity: 1; pointer-events: auto; }
.auth-modal {
  background: var(--bg-card);
  border: 1px solid var(--border-gold);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
  position: relative;
  transform: translateY(20px);
  transition: transform 0.3s ease;
}
.auth-overlay.active .auth-modal { transform: translateY(0); }
.auth-modal-close {
  position: absolute;
  top: 12px; right: 16px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.5rem;
  cursor: pointer;
  transition: var(--transition);
}
.auth-modal-close:hover { color: var(--text-primary); }
.auth-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--border-subtle);
}
.auth-tab {
  flex: 1;
  padding: 12px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.95rem;
  cursor: pointer;
  transition: var(--transition);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.auth-tab.active { color: var(--gold-light); border-bottom-color: var(--gold); }
.auth-form { display: none; flex-direction: column; gap: 16px; }
.auth-form.active { display: flex; }
.auth-input {
  height: 44px;
  padding: 0 16px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  background: var(--bg-card-alt);
  color: var(--text-primary);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.9rem;
  outline: none;
  transition: var(--transition);
}
.auth-input::placeholder { color: var(--text-muted); }
.auth-input:focus { border-color: var(--border-gold); }
.auth-error {
  color: var(--crimson-light);
  font-size: 0.82rem;
  min-height: 1.2em;
}
.auth-submit {
  height: 44px;
  border: none;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #1a1a2e;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.auth-submit:hover { opacity: 0.9; }
.auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }

/* ============ User Menu ============ */
.user-area {
  display: flex;
  align-items: center;
  gap: 12px;
}
.user-name {
  color: var(--gold-light);
  font-weight: 500;
  font-size: 0.9rem;
}
.btn-auth {
  padding: 8px 20px;
  border: 1px solid var(--border-gold);
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--gold-light);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: var(--transition);
}
.btn-auth:hover { background: rgba(212, 167, 69, 0.12); }
.btn-logout {
  padding: 8px 16px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--text-muted);
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: var(--transition);
}
.btn-logout:hover { color: var(--crimson-light); border-color: var(--crimson-light); }

/* ============ Pick History ============ */
.history-card {
  background: var(--bg-card-alt);
  border-radius: var(--radius-md);
  padding: 18px 20px;
  border: 1px solid var(--border-subtle);
  margin-bottom: 12px;
}
.history-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
  font-size: 0.82rem;
  color: var(--text-secondary);
}
.history-card-header strong { color: var(--text-primary); font-family: 'Noto Serif SC', serif; }
.history-card .mini-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  margin-bottom: 6px;
}
.history-card .mini-row .ticket-index {
  color: var(--text-muted);
  font-size: 0.75rem;
  margin-right: 4px;
  min-width: 36px;
}

/* ============ Responsive ============ */
@media (max-width: 640px) {
  .app-container { padding: 28px 16px 60px; }
  .section { padding: 24px 18px; margin-bottom: 20px; border-radius: var(--radius-md); }

      <input class="auth-input" type="password" id="regPassword" placeholder="密码（6-50位）" required />
      <span class="auth-error" id="regError"></span>
      <button class="auth-submit" type="submit">注册</button>

<script>
// ============ Config ============
const BACKEND_URL = '__BACKEND_URL__'; // 构建时由环境变量注入

// ============ State ============
let historyData = [];
let pickCount = 5;
let isLoadingHistory = true;
let historyLoadError = null;

// Auth state
let authToken = localStorage.getItem('lottery_token') || '';
let currentUser = localStorage.getItem('lottery_username') || '';

// ============ Background Particles ============
(function initParticles() {
  const container = document.getElementById('particles');
  const colors = ['rgba(212,167,69,0.5)', 'rgba(192,57,43,0.3)', 'rgba(74,144,217,0.3)'];
  for (let i = 0; i < 30; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    const size = Math.random() * 3 + 1;
    particle.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      background: ${colors[Math.floor(Math.random() * 3)]};
      animation-duration: ${Math.random() * 15 + 10}s;
      animation-delay: ${Math.random() * 15}s;
    `;
    container.appendChild(particle);
  }
})();

// ============ Toast ============
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ============ Count Selector ============
function changeCount(delta) {
  pickCount = Math.max(1, Math.min(20, pickCount + delta));
  document.getElementById('countDisplay').textContent = pickCount;
}

// ============ Lucky Input ============
function clearLuckyInput() {
  const input = document.getElementById('luckyInput');
  input.value = '';
  updateClearBtn();
  input.focus();
}

function updateClearBtn() {
  const input = document.getElementById('luckyInput');
  const clearBtn = document.getElementById('luckyClear');
  clearBtn.classList.toggle('visible', input.value.length > 0);
}

// ============ Auth ============
function isLoggedIn() { return !!authToken; }

function openAuth() {
  document.getElementById('authOverlay').classList.add('active');
  document.getElementById('loginError').textContent = '';
  document.getElementById('regError').textContent = '';
}

function closeAuth() {
  document.getElementById('authOverlay').classList.remove('active');
}

function closeAuthOutside(e) {
  if (e.target === document.getElementById('authOverlay')) closeAuth();
}

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('loginForm').classList.toggle('active', tab === 'login');
  document.getElementById('registerForm').classList.toggle('active', tab === 'register');
  document.getElementById('loginError').textContent = '';
  document.getElementById('regError').textContent = '';
}

async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');

  if (!username || !password) { errEl.textContent = '请填写用户名和密码'; return; }

  try {
    const res = await fetch(`${BACKEND_URL}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || '登录失败'; return; }

    authToken = data.token;
    currentUser = data.username;
    localStorage.setItem('lottery_token', authToken);
    localStorage.setItem('lottery_username', currentUser);
    updateUserUI();
    closeAuth();
    showToast(`欢迎回来，${currentUser}`);
    loadMyPicks();
  } catch (err) {
    errEl.textContent = '网络错误，请稍后重试';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const username = document.getElementById('regUsername').value.trim();
  const password = document.getElementById('regPassword').value;
  const errEl = document.getElementById('regError');

  if (!username || !password) { errEl.textContent = '请填写用户名和密码'; return; }

  try {
    const res = await fetch(`${BACKEND_URL}/api/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || '注册失败'; return; }

    showToast('注册成功，请登录');
    switchAuthTab('login');
    document.getElementById('loginUsername').value = username;
    document.getElementById('loginPassword').value = '';
  } catch (err) {
    errEl.textContent = '网络错误，请稍后重试';
  }
}

function logout() {
  authToken = '';
  currentUser = '';
  localStorage.removeItem('lottery_token');
  localStorage.removeItem('lottery_username');
  updateUserUI();
  showToast('已退出登录');
  document.getElementById('myPicksDisplay').innerHTML = '';
}

function updateUserUI() {
  const area = document.getElementById('userArea');
  const picksSection = document.getElementById('myPicksSection');
  if (isLoggedIn()) {
    area.innerHTML = `
      <span class="user-name">👤 ${currentUser}</span>
      <button class="btn-logout" onclick="logout()">退出</button>`;
    picksSection.style.display = 'block';
  } else {
    area.innerHTML = '<button class="btn-auth" onclick="openAuth()">登录 / 注册</button>';
    picksSection.style.display = 'none';
  }
}

// ============ Fetch current issue ============
function getLatestIssue() {
  if (historyData.length === 0) return '';
  // The latest item in historyData is the most recent draw
  // API returns items newest first. We need the next issue number.
  // huiniao.top's last.next_code is the upcoming issue
  // Since we don't fetch `last` from the list, we calculate it:
  // The latest result's code + 1 (rough approximation)
  const latest = historyData[0];
  if (!latest || !latest.issue) return '';
  const issueNum = parseInt(latest.issue, 10);
  if (isNaN(issueNum)) return '';
  return String(issueNum + 1);
}

// ============ Pick History ============
async function loadMyPicks() {
  const container = document.getElementById('myPicksDisplay');
  if (!isLoggedIn()) { container.innerHTML = ''; return; }

  try {
    const res = await fetch(`${BACKEND_URL}/api/picks?page=1&limit=10`, {
      headers: { 'Authorization': `Bearer ${authToken}` },
    });
    if (!res.ok) { container.innerHTML = ''; return; }
    const json = await res.json();
    if (!json.data || json.data.length === 0) {
      container.innerHTML = '<div class="empty-state"><p>暂无历史机选记录</p></div>';
      return;
    }

    let html = '';
    json.data.forEach(batch => {
      html += `<div class="history-card">
        <div class="history-card-header">
          <span><strong>第${batch.issue}期</strong> · ${batch.tickets.length}注</span>
          <span>${batch.createdAt?.slice(0, 10) || ''}${batch.luckySeed ? ' · 🔮' + batch.luckySeed : ''}</span>
        </div>`;
      batch.tickets.forEach((t, i) => {
        html += '<div class="mini-row"><span class="ticket-index">第' + (i + 1) + '注</span>';
        t.reds.forEach(r => {
          html += `<span class="mini-ball mini-ball-red">${String(r).padStart(2, '0')}</span>`;
        });
        html += '+';
        html += `<span class="mini-ball mini-ball-blue">${String(t.blue).padStart(2, '0')}</span>`;
        html += '</div>';
      });
      html += '</div>';
    });
    container.innerHTML = html;
  } catch (err) {
    console.error('Load picks error:', err);
  }
}

// ============ Save Picks to Backend ============
async function savePicksToBackend(tickets, luckySeed) {
  const issue = getLatestIssue();
  if (!issue) { showToast('无法确定当前期号，结果未保存'); return; }

  try {
    const res = await fetch(`${BACKEND_URL}/api/picks`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`,
      },
      body: JSON.stringify({ issue, tickets, luckySeed: luckySeed || undefined }),
    });
    if (res.ok) {
      // Reload pick history
      setTimeout(() => loadMyPicks(), 500);
    }
  } catch (err) {
    console.error('Save picks error:', err);
  }
}

// ============ Seeded Random ============
function hashString(str) {
  let hash = 5381;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) + hash + str.charCodeAt(i)) | 0;
  }
  return hash >>> 0;
}

function createRNG(seed) {
  // mulberry32 PRNG — deterministic, high-quality
  let s = seed | 0;
  return function () {
    s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ============ Fetch History Data ============
async function fetchHistoryData() {
  const API_URL = 'https://api.huiniao.top/interface/home/lotteryHistory';
  const params = new URLSearchParams({ type: 'ssq', page: '1', limit: '50' });

  const response = await fetch(`${API_URL}?${params}`);
  if (!response.ok) {
    throw new Error(`HTTP ${response.status}: 请求失败`);
  }
  const json = await response.json();
  if (json.code !== 1 || !json.data || !json.data.data || !json.data.data.list) {
    throw new Error(json.info || '接口返回数据异常');
  }
  return json.data.data.list;
}

// ============ Parse History Data ============
function parseHistoryData(rawResults) {
  return rawResults.map((item) => {
    const redBalls = [];
    // huiniao.top API: one~six are red balls, seven is blue ball
    const fields = ['one', 'two', 'three', 'four', 'five', 'six'];
    fields.forEach(f => {
      const num = parseInt(item[f], 10);
      if (!isNaN(num)) redBalls.push(num);
    });
    const blueBall = parseInt(item.seven, 10) || 0;
    return {
      issue: item.code || '',
      date: item.day || '',
      reds: redBalls,
      blue: blueBall,
    };
  }).filter(item => item.reds.length === 6 && item.blue > 0);
}

// ============ Render History ============
function renderHistory() {
  const container = document.getElementById('historyContent');

  if (isLoadingHistory) {
    container.innerHTML = `
      <div class="loading-overlay">
        <div class="spinner"></div>
        <span class="loading-text">正在获取开奖数据...</span>
      </div>`;
    return;
  }

  if (historyLoadError) {
    container.innerHTML = `
      <div class="error-state">
        <p>${historyLoadError}</p>
        <button class="retry-btn" onclick="loadHistory()">重新获取</button>
      </div>`;
    return;
  }

  if (historyData.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📋</div>
        <p>暂无开奖数据</p>
      </div>`;
    return;
  }

  let html = '<div class="history-scroll"><table class="history-table"><thead><tr>';
  html += '<th>期号</th><th>开奖日期</th>';
  for (let i = 1; i <= 6; i++) html += `<th>红球${i}</th>`;
  html += '<th>蓝球</th></tr></thead><tbody>';

  historyData.forEach(item => {
    html += '<tr>';
    html += `<td class="issue-num">${item.issue}</td>`;
    html += `<td>${item.date}</td>`;
    item.reds.forEach(r => {
      html += `<td><span class="mini-ball mini-ball-red">${String(r).padStart(2,'0')}</span></td>`;
    });
    html += `<td><span class="mini-ball mini-ball-blue">${String(item.blue).padStart(2,'0')}</span></td>`;
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

// ============ Load History ============
async function loadHistory() {
  isLoadingHistory = true;
  historyLoadError = null;
  renderHistory();

  try {
    const rawResults = await fetchHistoryData();
    historyData = parseHistoryData(rawResults);
    isLoadingHistory = false;
    showToast(`成功获取 ${historyData.length} 期开奖数据`);
  } catch (err) {
    isLoadingHistory = false;
    historyLoadError = err.message || '数据获取失败';
    console.error('History load error:', err);
  }
  renderHistory();
}

// ============ Smart Selection Strategy ============
function analyzeHistory() {
  if (historyData.length === 0) return null;

  const totalDraws = historyData.length;

  // Count red ball frequency (1-33)
  const redFreq = {};
  const redLastSeen = {};
  for (let i = 1; i <= 33; i++) {
    redFreq[i] = 0;
    redLastSeen[i] = totalDraws; // not seen at all
  }

  // Count blue ball frequency (1-16)
  const blueFreq = {};
  const blueLastSeen = {};
  for (let i = 1; i <= 16; i++) {
    blueFreq[i] = 0;
    blueLastSeen[i] = totalDraws;
  }

  // Analyze each draw (most recent = index 0)
  historyData.forEach((draw, idx) => {
    draw.reds.forEach(r => {
      redFreq[r] = (redFreq[r] || 0) + 1;
      if (redLastSeen[r] === totalDraws) redLastSeen[r] = idx;
    });
    const b = draw.blue;
    blueFreq[b] = (blueFreq[b] || 0) + 1;
    if (blueLastSeen[b] === totalDraws) blueLastSeen[b] = idx;
  });

  return { redFreq, redLastSeen, blueFreq, blueLastSeen, totalDraws };
}

function calculateScore(freq, lastSeen, totalDraws, rng) {
  // Frequency score: higher frequency = higher score
  const freqScore = freq / totalDraws;
  // Recency score: recently seen = some bonus, long gap = higher chance (gambler's fallacy inspired)
  const recencyScore = lastSeen === totalDraws ? 1.0 : (lastSeen / totalDraws) * 0.8 + 0.2;
  // Combine: 50% frequency (hot numbers), 30% recency (cold has higher chance), 20% random
  return freqScore * 0.5 + recencyScore * 0.3 + rng() * 0.2;
}

function smartPickReds(analysis, count, rng) {
  const { redFreq, redLastSeen, totalDraws } = analysis;
  const candidates = [];

  for (let i = 1; i <= 33; i++) {
    const score = calculateScore(redFreq[i], redLastSeen[i], totalDraws, rng);
    candidates.push({ num: i, score });
  }

  // Sort by score descending, pick from top candidates with some randomness
  candidates.sort((a, b) => b.score - a.score);

  // Weighted random selection from the top 25 candidates
  const pool = candidates.slice(0, 25);
  const selected = new Set();

  while (selected.size < count) {
    const prevSize = selected.size;
    const totalWeight = pool.reduce((sum, c) => sum + c.score, 0);
    let rand = rng() * totalWeight;
    for (const c of pool) {
      rand -= c.score;
      if (rand <= 0 && !selected.has(c.num)) {
        selected.add(c.num);
        break;
      }
    }
    // Fallback: if weighted selection didn't add a new number, force-add the first available
    if (selected.size === prevSize) {
      for (const c of pool) {
        if (!selected.has(c.num)) {
          selected.add(c.num);
          break;
        }
      }
    }
  }

  return [...selected].sort((a, b) => a - b);
}

function smartPickBlue(analysis, rng) {
  const { blueFreq, blueLastSeen, totalDraws } = analysis;
  const candidates = [];

  for (let i = 1; i <= 16; i++) {
    const score = calculateScore(blueFreq[i], blueLastSeen[i], totalDraws, rng);
    candidates.push({ num: i, score });
  }

  candidates.sort((a, b) => b.score - a.score);

  // Weighted random from top 12
  const pool = candidates.slice(0, 12);
  const totalWeight = pool.reduce((sum, c) => sum + c.score, 0);
  let rand = rng() * totalWeight;
  for (const c of pool) {
    rand -= c.score;
    if (rand <= 0) return c.num;
  }
  return pool[0].num;
}

// ============ Generate Picks ============
function generatePicks() {
  const btn = document.getElementById('btnGenerate');
  const display = document.getElementById('ballDisplay');
  const strategyInfo = document.getElementById('strategyInfo');

  if (!isLoggedIn()) {
    showToast('请先登录后再使用机选功能');
    openAuth();
    return;
  }

  if (historyData.length === 0) {
    showToast('请先等待历史数据加载完成');
    return;
  }

  // Button animation
  btn.classList.add('loading');
  setTimeout(() => btn.classList.remove('loading'), 600);

  // Get lucky seed
  const luckyStr = document.getElementById('luckyInput').value.trim();
  updateClearBtn();

  let baseSeed = Date.now();
  let rng = null;
  let seedTag = '';
  if (luckyStr.length > 0) {
    const hash = hashString(luckyStr);
    baseSeed = hash;
    seedTag = `<span class="strategy-badge">🔮 幸运种子：${escapeHtml(luckyStr)}</span>`;
  } else {
    seedTag = '<span class="strategy-badge">🔀 随机种子：时间戳</span>';
  }

  const analysis = analyzeHistory();
  if (!analysis) {
    showToast('暂无足够的历史数据进行分析');
    return;
  }

  const tickets = [];
  for (let i = 0; i < pickCount; i++) {
    // Create a new RNG each iteration with derived seed for independence
    const stepSeed = baseSeed + i * 911382629;
    rng = luckyStr.length > 0 ? createRNG(stepSeed) : Math.random;
    const reds = smartPickReds(analysis, 6, rng);
    const blue = smartPickBlue(analysis, rng);
    tickets.push({ reds, blue });
  }

  // Render strategy info
  const hotReds = Object.entries(analysis.redFreq)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 5)
    .map(([n]) => n);
  const hotBlues = Object.entries(analysis.blueFreq)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3)
    .map(([n]) => n);

  strategyInfo.innerHTML = `
    <span class="strategy-badge">📊 分析期数：${analysis.totalDraws}期</span>
    <span class="strategy-badge">🔥 红球热号：${hotReds.join('、')}</span>
    <span class="strategy-badge">💎 蓝球热号：${hotBlues.join('、')}</span>
    <span class="strategy-badge">🎯 选号策略：热度+冷号加权随机</span>
    ${seedTag}
  `;

  // Render balls
  let html = '';
  tickets.forEach((ticket, idx) => {
    html += `<div class="ticket-group">
      <div class="ticket-label">第 ${idx + 1} 注</div>
      <div class="balls-row">`;
    ticket.reds.forEach((r, ri) => {
      html += `<span class="ball ball-red" style="animation-delay:${ri * 0.06 + idx * 0.08}s">${String(r).padStart(2, '0')}</span>`;
    });
    html += `<span class="ball-divider">+</span>`;
    html += `<span class="ball ball-blue" style="animation-delay:${6 * 0.06 + idx * 0.08}s">${String(ticket.blue).padStart(2, '0')}</span>`;
    html += `</div></div>`;
  });

  display.innerHTML = html;
  if (luckyStr.length > 0) {
    showToast(`已为「${luckyStr}」生成 ${pickCount} 注号码`);
  } else {
    showToast(`已生成 ${pickCount} 注号码`);
  }

  // Save to backend
  savePicksToBackend(tickets, luckyStr.length > 0 ? luckyStr : undefined);
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, function(m) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]);
  });
}

// ============ Init ============
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('luckyInput');
  input.addEventListener('input', updateClearBtn);
  updateClearBtn();

  // Restore auth state
  updateUserUI();
  if (isLoggedIn()) {
    loadMyPicks();
  }

  loadHistory();
});
</script>
